server:
  port: 8080

spring:
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/oj_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  mail:
    host: smtp.qq.com
    port: 465
    username: ${QQ_MAIL_USERNAME:}
    password: ${QQ_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 3s
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        default-requeue-rejected: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

leetcode:
  base-url: https://leetcode.cn
  session: ${LEETCODE_SESSION:}
  csrf-token: ${LEETCODE_CSRF_TOKEN:}

luogu:
  base-url: https://www.luogu.com.cn
  uid: ${LUOGU_UID:}
  client-id: ${LUOGU_CLIENT_ID:}

dify:
  base-url: ${DIFY_BASE_URL:http://localhost/v1}
  api-key: ${DIFY_API_KEY:}
  smart-generate-key: ${DIFY_SMART_GENERATE_KEY:}
  contest-analysis-key: ${DIFY_CONTEST_ANALYSIS_KEY:}

jwt:
  secret: ${JWT_SECRET:}
  expiration: 86400000

judge:
  queue:
    exchange: judge.direct
    contest-submit-queue: judge.contest.submit.queue
    contest-submit-routing-key: judge.contest.submit
    contest-submit-dlq: judge.contest.submit.dlq
    contest-submit-dl-routing-key: judge.contest.submit.dlq
    contest-poll-queue: judge.contest.poll.queue
    contest-poll-routing-key: judge.contest.poll
    contest-poll-dlq: judge.contest.poll.dlq
    contest-poll-dl-routing-key: judge.contest.poll.dlq
    contest-poll-delay-queue: judge.contest.poll.delay.queue
    contest-poll-delay-routing-key: judge.contest.poll.delay
    initial-poll-delay-ms: 2000
    poll-delay-ms: 2000
    max-poll-delay-ms: 10000
    max-poll-attempts: 180
    message-dedup-ttl-ms: 21600000
    compensation-fixed-delay-ms: 60000
    submit-compensation-delay-seconds: 30
    poll-compensation-delay-seconds: 60
    compensation-throttle-seconds: 120
    compensation-batch-size: 50
