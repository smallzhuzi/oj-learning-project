# ============================================================
# AI 智能 OJ 学习平台 - 后端配置
# ============================================================

server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/oj_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    # 日期格式统一
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  # 邮件发送配置（QQ 邮箱 SMTP）
  mail:
    host: smtp.qq.com
    port: 465
    username: ${QQ_MAIL_USERNAME:2351661676@qq.com}
    password: ${QQ_MAIL_PASSWORD:jwwljnmidbsldieg}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    # 驼峰命名自动映射（user_id → userId）
    map-underscore-to-camel-case: true
    # 开发阶段打印 SQL 日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键自增策略
      id-type: auto

